<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#125b50">
    <title>N Smart Phone Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ed;
        color: #1e2b2a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(440px, 100%);
        border: 1px solid #d8d0c2;
        border-radius: 8px;
        background: #fffdfa;
        padding: 24px;
        box-shadow: 0 18px 50px rgb(31 45 43 / 10%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.45rem;
      }

      p {
        margin: 0;
        color: #596866;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>N Smart Phone is available, but network-backed device sync is unavailable right now.</p>
    </main>
  </body>
</html>
